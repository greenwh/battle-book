<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="iceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f8ff"/>
      <stop offset="45%"  stop-color="#a8dff5"/>
      <stop offset="100%" stop-color="#5cc4e8"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5e54a"/>
      <stop offset="100%" stop-color="#c89010"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background to match site canvas -->
  <rect width="32" height="32" fill="#0d0f14" rx="3"/>

  <!-- Crown: 3-point, centered at x=16, y range 2–11 -->
  <path d="M 7,11 L 7,8 L 10,3 L 12.5,7 L 16,2 L 19.5,7 L 22,3 L 25,8 L 25,11 Z"
        fill="url(#crownGrad)" filter="url(#glow)"/>

  <!-- K in Georgia serif with ice gradient -->
  <text x="16" y="27"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16"
        font-weight="bold"
        fill="url(#iceGrad)"
        filter="url(#glow)">K</text>
</svg>
